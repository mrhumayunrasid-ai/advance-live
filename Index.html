<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Hub Advanced</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">Digital Hub</div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#trending">Trending</a></li>
        <li><a href="#social">Social</a></li>
        <li><a href="#shop">Shop</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to Digital Hub</h1>
      <p>Explore trending videos, social feeds, and shopping—all in one place!</p>
      <a href="#trending" class="btn">Explore Now</a>
    </div>
  </section>

  <!-- Trending Section -->
  <section id="trending" class="cards-section">
    <h2>🔥 Trending Videos</h2>
    <div id="trending-videos" class="cards-container"></div>
  </section>

  <!-- Social Section -->
  <section id="social" class="cards-section">
    <h2>📱 Social Feed</h2>
    <div id="social-feed" class="cards-container"></div>
  </section>

  <!-- Shopping Section -->
  <section id="shop" class="cards-section">
    <h2>🛒 Trending Products</h2>
    <div id="shop-products" class="cards-container"></div>
  </section>

  <footer>
    <p>&copy; 2026 Digital Hub. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
